<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>📈 BagIdea Monitoring</title>
<style>
  :root { --bg:#0c1322; --bg2:#111c33; --fg:#dbe7ff; --mut:#7e93bf; --acc:#5ec8ff;
          --ok:#3ad29f; --warn:#f5c451; --crit:#ff6b7d; --line:#1e2c4a; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--fg); font:13px/1.5 system-ui,"Segoe UI",sans-serif;
         display:flex; flex-direction:column; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:#26365c; border-radius:8px; }
  header { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--line);
           position:sticky; top:0; background:var(--bg); z-index:2; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  .pill { font-size:11px; padding:3px 10px; border-radius:999px; font-weight:600; letter-spacing:.3px; }
  .pill.ok{background:rgba(58,210,159,.15);color:var(--ok);} .pill.warn{background:rgba(245,196,81,.15);color:var(--warn);}
  .pill.crit{background:rgba(255,107,125,.15);color:var(--crit);} .pill.down{background:rgba(126,147,191,.15);color:var(--mut);}
  .spacer { flex:1; }
  .meta { font-size:11px; color:var(--mut); }
  main { flex:1; overflow:auto; padding:16px; display:flex; flex-direction:column; gap:16px; }
  .grid { display:grid; gap:12px; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); }
  .card { background:var(--bg2); border:1px solid var(--line); border-radius:12px; padding:14px; }
  .card h2 { font-size:13px; margin:0 0 4px; display:flex; align-items:center; gap:8px; }
  .card .detail { font-size:11px; color:var(--mut); margin-bottom:10px; min-height:1.4em; }
  .mrow { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-top:1px solid var(--line); }
  .mrow:first-of-type { border-top:0; }
  .mlabel { color:var(--mut); }
  .mval { font-weight:600; font-variant-numeric:tabular-nums; }
  .mval.warn{color:var(--warn);} .mval.crit{color:var(--crit);} .mval.ok{color:var(--fg);}
  .dot { width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .dot.ok{background:var(--ok);} .dot.warn{background:var(--warn);} .dot.crit{background:var(--crit);} .dot.down{background:var(--mut);}
  section h3 { font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--mut); margin:0 0 8px; }
  .empty { font-size:12px; color:var(--mut); font-style:italic; padding:10px; border:1px dashed var(--line); border-radius:10px; }
  .alert { background:var(--bg2); border-left:3px solid var(--mut); border-radius:8px; padding:8px 12px; margin-bottom:8px; }
  .alert.crit{border-left-color:var(--crit);} .alert.warn{border-left-color:var(--warn);} .alert.info{border-left-color:var(--acc);}
  .alert .t { font-weight:600; } .alert .d { font-size:11px; color:var(--mut); }
  footer { padding:8px 16px; border-top:1px solid var(--line); font-size:11px; color:var(--mut); display:flex; gap:14px; align-items:center; }
  button { background:#1a2742; color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:4px 12px; cursor:pointer; font-size:12px; }
  button:hover { border-color:var(--acc); }
</style>
</head>
<body>
  <header>
    <h1>📈 BagIdea Monitoring</h1>
    <span id="health" class="pill down">—</span>
    <div class="spacer"></div>
    <span id="updated" class="meta">กำลังโหลด…</span>
    <button id="refresh">รีเฟรช</button>
  </header>

  <main>
    <div id="cards" class="grid"></div>

    <section>
      <h3>🔔 Alerts <span class="meta" id="alertHint"></span></h3>
      <div id="alerts"></div>
    </section>

    <section>
      <h3>🤖 Anomalies <span class="meta" id="anomalyHint"></span></h3>
      <div id="anomalies"></div>
    </section>
  </main>

  <footer>
    <span id="src">—</span>
    <div class="spacer" style="flex:1"></div>
    <span id="poll"></span>
  </footer>

<script>
const PID = "bagidea-monitoring";
const $ = (id) => document.getElementById(id);
let pollMs = 5000, timer = null;

const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
const clsOf = (st) => (["ok","warn","crit","down"].includes(st) ? st : "ok");

function srcCard(id, s) {
  const label = esc(s.label || id);
  const st = clsOf(s.status);
  const rows = (s.metrics || []).map((m) =>
    `<div class="mrow"><span class="mlabel">${esc(m.label || m.key)}</span>` +
    `<span class="mval ${clsOf(m.status)}">${esc(m.value)}${m.unit && m.unit!=="bool" ? " "+esc(m.unit) : ""}</span></div>`
  ).join("");
  return `<div class="card"><h2><span class="dot ${st}"></span>${label}` +
    `<span class="pill ${st}" style="margin-left:auto">${esc(s.status)}</span></h2>` +
    `<div class="detail">${esc(s.detail)}</div>${rows || '<div class="meta">— ไม่มี metric —</div>'}</div>`;
}

function renderList(el, items, kind) {
  if (!items || !items.length) {
    el.innerHTML = `<div class="empty">ยังไม่มี ${kind} — เฟส 1 ยังไม่เปิด hook ` +
      `(${kind === "alert" ? "แบล็ค: hooks/alerts.js" : "น้องไวท์: hooks/anomaly.js"})</div>`;
    return;
  }
  el.innerHTML = items.map((a) =>
    `<div class="alert ${clsOf(a.severity)}"><div class="t">${esc(a.title || a.id)}</div>` +
    `<div class="d">${esc(a.source || a.hook || "")}${a.detail ? " — " + esc(a.detail) : ""}</div></div>`
  ).join("");
}

function render(snap) {
  const h = clsOf(snap.health || "down");
  $("health").className = "pill " + h;
  $("health").textContent = (snap.health || "?").toUpperCase();
  // metrics จัดกลุ่มเข้า card ตาม source (snapshot.sources มี metrics? — ใส่ให้)
  const sources = snap.sources || {};
  const bySrc = {};
  for (const m of snap.metrics || []) { (bySrc[m.source] = bySrc[m.source] || []).push(m); }
  $("cards").innerHTML = Object.keys(sources).map((id) =>
    srcCard(id, { ...sources[id], metrics: bySrc[id] || [] })).join("") ||
    '<div class="empty">ไม่มี data source — ตรวจ config/endpoint</div>';
  renderList($("alerts"), snap.alerts, "alert");
  renderList($("anomalies"), snap.anomalies, "anomaly");
  const d = new Date(snap.ts || Date.now());
  $("updated").textContent = "อัปเดต " + d.toLocaleTimeString("th-TH");
  $("src").textContent = "baseUrl: " + esc(snap.baseUrl || "?") + " · sources: " + Object.keys(sources).length +
    (snap.hooks && snap.hooks.length ? " · hooks: " + snap.hooks.join(", ") : " · hooks: —");
}

async function refresh() {
  try {
    const r = await fetch("/plugin/" + PID + "/snapshot", { cache: "no-store" });
    const snap = await r.json();
    render(snap);
  } catch (e) { $("updated").textContent = "โหลดไม่ได้: " + e.message; }
}

async function loadCfg() {
  try {
    const r = await fetch("/plugin/" + PID + "/cmd", { method: "POST",
      headers: { "content-type": "application/json" }, body: JSON.stringify({ cmd: "config" }) });
    const j = await r.json();
    if (j && j.config && j.config.pollMs) pollMs = j.config.pollMs;
  } catch {}
  $("poll").textContent = "poll ทุก " + Math.round(pollMs / 1000) + "s";
  if (timer) clearInterval(timer);
  timer = setInterval(refresh, pollMs);
}

$("refresh").onclick = refresh;

// live nudge: เมื่อ server มีข้อมูลใหม่ (หรือ source อื่นเปลี่ยน) → refresh
try {
  const ws = new WebSocket("ws://" + location.host + "/ws");
  ws.onmessage = (m) => { try { const e = JSON.parse(m.data);
    if (e.type === "plugin.event" && e.plugin === PID) refresh(); } catch {} };
} catch {}

loadCfg().then(refresh);
</script>
</body>
</html>
